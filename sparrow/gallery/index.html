<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparrow Image Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="eyebrow">GitHub Pages Gallery</p>
      <h1>Sparrow Image Archive</h1>
      <p id="summary" class="summary">Loading images...</p>
    </div>
  </header>

  <main id="gallery" class="gallery-root" aria-live="polite"></main>

  <template id="folder-template">
    <section class="folder-section">
      <h2 class="folder-title"></h2>
      <div class="folder-grid"></div>
    </section>
  </template>

  <template id="card-template">
    <figure class="image-card">
      <img loading="lazy" decoding="async" alt="">
      <figcaption></figcaption>
    </figure>
  </template>

  <!-- Lightbox -->
  <div id="lightbox" class="lb-overlay" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button class="lb-close" aria-label="Close">&times;</button>
    <button class="lb-prev" aria-label="Previous">&#8249;</button>
    <div class="lb-stage">
      <img id="lb-img" src="" alt="">
      <p id="lb-caption" class="lb-caption"></p>
    </div>
    <button class="lb-next" aria-label="Next">&#8250;</button>
  </div>

  <script src="manifest.js"></script>
  <script src="titles.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
